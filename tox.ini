[tox]
envlist =
    py{39,310,311,312}
    ansible-{2.10,2.11,2.12,2.13,2.14,2.15,8,9,10,11}
    lint
    type
skip_missing_interpreters = true

[testenv]
description = Run unit tests with pytest
deps =
    -r{toxinidir}/requirements-dev.txt
commands =
    pytest {posargs:tests/unit/}

[testenv:ansible-2.10]
description = Test with Ansible 2.10
deps =
    ansible>=2.10,<2.11
    -r{toxinidir}/requirements-dev.txt
commands =
    pytest {posargs:tests/}

[testenv:ansible-2.11]
description = Test with Ansible 2.11
deps =
    ansible>=2.11,<2.12
    -r{toxinidir}/requirements-dev.txt

[testenv:ansible-2.12]
description = Test with Ansible 2.12
deps =
    ansible>=2.12,<2.13
    -r{toxinidir}/requirements-dev.txt

[testenv:ansible-2.13]
description = Test with Ansible 2.13
deps =
    ansible>=2.13,<2.14
    -r{toxinidir}/requirements-dev.txt

[testenv:ansible-2.14]
description = Test with Ansible 2.14
deps =
    ansible>=2.14,<2.15
    -r{toxinidir}/requirements-dev.txt

[testenv:ansible-2.15]
description = Test with Ansible 2.15
deps =
    ansible>=2.15,<3.0
    -r{toxinidir}/requirements-dev.txt

[testenv:ansible-8]
description = Test with Ansible 8.x
deps =
    ansible>=8,<9
    -r{toxinidir}/requirements-dev.txt

[testenv:ansible-9]
description = Test with Ansible 9.x
deps =
    ansible>=9,<10
    -r{toxinidir}/requirements-dev.txt

[testenv:ansible-10]
description = Test with Ansible 10.x
deps =
    ansible>=10,<11
    -r{toxinidir}/requirements-dev.txt

[testenv:ansible-11]
description = Test with Ansible 11.x
deps =
    ansible>=11,<12
    -r{toxinidir}/requirements-dev.txt

[testenv:lint]
description = Run linters (pylint, flake8, ansible-lint)
skip_install = true
deps =
    -r{toxinidir}/requirements-dev.txt
    pylint
    flake8
    ansible-lint>=6.0
commands =
    flake8 plugins/ tests/
    python -m pylint plugins/ --disable=all --enable=E,F
    ansible-lint plugins/ || true

[testenv:type]
description = Run type checking with mypy
skip_install = true
deps =
    -r{toxinidir}/requirements-dev.txt
    mypy
commands =
    mypy plugins/

[testenv:coverage]
description = Run tests with coverage reporting
deps =
    -r{toxinidir}/requirements-dev.txt
    pytest-cov
commands =
    pytest --cov=plugins --cov-report=html --cov-report=term-missing {posargs:tests/unit/}

[testenv:docs]
description = Build documentation (if applicable)
skip_install = true
deps =
    sphinx>=4.0
commands =
    echo "No documentation build configured yet"

[gh-actions]
python =
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312
    
[gh-actions:env]
ANSIBLE_VERSION =
    2.10: ansible-2.10
    2.11: ansible-2.11
    2.12: ansible-2.12
    2.13: ansible-2.13
    2.14: ansible-2.14
    2.15: ansible-2.15
    8: ansible-8
    9: ansible-9
    10: ansible-10
    11: ansible-11
